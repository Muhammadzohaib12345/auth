<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your email</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dist/output.css" />
</head>
<body class="font-sans bg-[#EDEEFB] min-h-screen flex items-center justify-center px-4 py-10 text-ink">
    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-8 sm:p-12">

        <div class="flex justify-end mb-4">
            <a href="#" class="text-sm font-bold text-brand hover:text-brand-dark transition">Need help?</a>
        </div>

        <h1 class="text-3xl sm:text-4xl font-extrabold text-center">Verify your email</h1>
        <p class="text-center text-gray-500 mt-3">Enter the 6-digit OTP sent to</p>
        <p class="text-center font-bold text-brand mb-8">Example@email.com</p>

        <div class="flex justify-center mx-5gap-3 sm:gap-4">
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
            <input inputmode="numeric" maxlength="1"
                class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border border-gray-200 rounded-xl" />
        </div>

        <p class="text-center text-gray-500 mt-6">
            Didn't receive the code?
            <span class="text-brand font-semibold">Resend in 00:45</span>
        </p>

        <a href="forgotpassword.html"
            class="block text-center w-full mt-6 bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl">
            Verify OTP
        </a>

        <div class="flex items-center gap-4 my-6">
            <span class="h-px flex-1 bg-gray-200"></span>
            <span class="text-sm text-gray-400">or</span>
            <span class="h-px flex-1 bg-gray-200"></span>
        </div>

        <a href="login.html"
           class="block text-center bg-brand border hover:bg-brand-dark text-white font-bold px-9 py-3 rounded-xl">
            ← Go back
        </a>

    </div>
</body>
</html>

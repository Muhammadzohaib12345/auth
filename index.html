<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dist/output.css" />
    <title>Create your account</title>
</head>
<body class="font-sans bg-[#EDEEFB] min-h-screen flex items-center justify-center px-4 py-10 text-ink">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 sm:p-10">

        <div class="w-14 h-14 rounded-2xl bg-brand-light mx-auto mb-5"></div>
        <h1 class="text-3xl font-extrabold text-center">Create your account</h1>
        <p class="text-center text-gray-500 mt-2 mb-8">Sign up to get started with us</p>

        <form action="" class="space-y-5">

            <div>
                <label class="block text-sm font-bold mb-2">Full Name</label>
                <div class="relative">
                    <input type="text" placeholder="Enter your full name" required
                        class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400" />
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Email</label>
                <div class="relative">
                    <input type="email" placeholder="Enter your email" required
                        class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400" />
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Password</label>
                <div class="relative">
                    <input type="password" placeholder="Enter your password" required
                        class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400" />
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" placeholder="Re-enter your password" required
                        class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400" />
                </div>
            </div>

            <button type="submit"
                class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-brand/30">
                Sign Up
            </button>

        </form>

        <div class="flex items-center gap-4 my-6">
            <span class="h-px flex-1 bg-gray-200"></span>
            <span class="text-sm text-gray-400">or</span>
            <span class="h-px flex-1 bg-gray-200"></span>
        </div>

        <p class="text-center text-gray-500">
            Already have an account?
            <a href="login.html" class="font-bold text-brand hover:text-brand-dark transition">Login</a>
        </p>

    </div>
</body>
</html>

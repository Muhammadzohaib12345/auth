<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="dist/output.css">
</head>
<body class="font-sans bg-[#EDEEFB] min-h-screen flex items-center justify-center px-4 py-10 text-ink">
<div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 sm:p-10">
<div class="w-14 h-14 rounded-2xl bg-brand mx-auto mb-5"></div>
        <h1 class="text-3xl font-extrabold text-center">Welcome Back</h1>
        <p class="text-center text-gray-500 mt-2 mb-8">Login to your account</p>

        <form action="" class="space-y-5">
            <div>
                <label class="block text-sm font-bold mb-2">Email</label>
                <div class="relative">
                    <input type="email" placeholder="Enter your email" required
                        class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400" />
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Password</label>
                <div class="relative">
                    <input type="password" placeholder="Enter your password" required
                    class="w-full rounded-xl border border-gray-200 py-3.5 pl-5 pr-4 placeholder-gray-400"/>
                </div>
            </div>

<div class="flex justify-end">
  <a href="forgotpassword.html" class="text-sm font-bold text-brand hover:text-brand-dark transition">Forgot password?</a>
</div>
<button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-xl">
  Login
</button>
        </form>
    </div>
</body>
</html>
